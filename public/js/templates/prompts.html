<div id="panel-prompts" class="panel">
    <div class="container">
      <div class="prompt-top-bar">
        <div style="flex:1">
          <label class="form-label">選擇故事</label>
          <select class="form-select" id="prompt-story-select" onchange="onPromptStoryChange()">
            <option value="">選擇一個故事...</option>
          </select>
        </div>
        <div class="form-group" style="min-width:150px">
          <label class="form-label">影片風格</label>
          <select class="form-select" id="prompt-video-style">
            <option value="cinematic">電影感</option><option value="documentary">紀錄片</option>
            <option value="anime">動畫風</option><option value="noir">黑色電影</option>
            <option value="music-video">MV 風格</option><option value="commercial">廣告質感</option>
          </select>
        </div>
        <div class="form-group" style="min-width:130px">
          <label class="form-label">AI 平台</label>
          <select class="form-select" id="prompt-platform">
            <option value="sora">Sora</option><option value="runway">Runway Gen-3</option>
            <option value="kling">Kling</option><option value="pika">Pika</option>
            <option value="veo">Veo</option><option value="generic">通用</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="generatePrompts()" id="btn-gen-prompts" style="margin-bottom:0">✦ 生成提示詞</button>
      </div>
      <div class="loading-bar" id="prompt-loading"><div class="fill"></div></div>
      <div id="prompts-result"></div>
      <div class="empty-state" id="prompts-empty">
        <div class="icon">🎬</div>
        <p>選擇一個故事並生成影片提示詞</p>
        <p style="font-size:.8rem;color:var(--text-ghost)">AI 將分析故事場景，生成適用於 Sora、Runway、Kling 等工具的詳細影片提示詞</p>
      </div>
    </div>
  </div>
