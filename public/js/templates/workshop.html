<div id="panel-workshop" class="panel">
    <div class="container">
      <div class="workshop-layout">
        <div class="workshop-sidebar">
          <div class="section-title" style="border:none;padding-bottom:0;margin-bottom:1.2rem">故事設定</div>

          <!-- AI 全權生成 -->
          <button class="btn btn-ai-autofill" id="btn-ai-autofill" onclick="aiAutoFill()">
            <span class="ai-icon">✦</span> AI 全權生成
            <span class="ai-badge">🎲 隨機創意</span>
          </button>
          <div class="loading-bar" id="autofill-loading"><div class="fill"></div></div>

          <!-- Stepper: 3-step progress -->
          <div class="stepper" id="form-stepper">
            <div class="stepper-step active" data-step="1"><div class="step-num">1</div><div class="step-label">基礎</div></div>
            <div class="stepper-connector"></div>
            <div class="stepper-step" data-step="2"><div class="step-num">2</div><div class="step-label">內容</div></div>
            <div class="stepper-connector"></div>
            <div class="stepper-step" data-step="3"><div class="step-num">3</div><div class="step-label">風格</div></div>
          </div>

          <!-- Section 1: 基礎設定 -->
          <div class="sidebar-section open" id="section-basic">
            <div class="sidebar-section-header" onclick="toggleSection('section-basic')">
              <span class="section-icon">✦</span>
              <span>基礎設定</span>
              <span class="chevron">›</span>
            </div>
            <div class="sidebar-section-body">
              <div class="form-group">
                <label class="form-label">故事標題</label>
                <input type="text" class="form-input" id="w-title" placeholder="為你的故事取名...">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">故事類型</label>
                  <select class="form-select" id="w-genre">
                    <option value="">選擇類型...</option>
                    <option value="scifi">科幻 Sci-Fi</option><option value="fantasy">奇幻 Fantasy</option>
                    <option value="romance">愛情 Romance</option><option value="mystery">懸疑 Mystery</option>
                    <option value="horror">恐怖 Horror</option><option value="historical">歷史 Historical</option>
                    <option value="cyberpunk">賽博龐克 Cyberpunk</option><option value="wuxia">武俠 Wuxia</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">子類型</label>
                  <select class="form-select" id="w-subgenre"><option value="">選擇子類型...</option></select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">核心主題</label>
                <input type="text" class="form-input" id="w-theme" placeholder="例如：時間旅行的代價">
              </div>
            </div>
          </div>

          <!-- Section 2: 故事內容 -->
          <div class="sidebar-section open" id="section-content">
            <div class="sidebar-section-header" onclick="toggleSection('section-content')">
              <span class="section-icon">📖</span>
              <span>故事內容</span>
              <span class="chevron">›</span>
            </div>
            <div class="sidebar-section-body">
              <div class="form-group">
                <label class="form-label">世界觀 / 場景設定</label>
                <textarea class="form-textarea" id="w-setting" placeholder="描述時間、地點、環境、社會結構..." rows="3"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">主要角色 <span class="hint">每行一個：名字 - 身份 - 特徵</span></label>
                <textarea class="form-textarea" id="w-characters" placeholder="林博士 - 量子物理學家 - 冷靜理性&#10;小雨 - AI 意識體 - 天真好奇" rows="4"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">附加元素</label>
                <div class="tag-input-wrap" id="elements-wrap" onclick="document.getElementById('elements-input').focus()">
                  <input type="text" id="elements-input" placeholder="輸入後按 Enter..." onkeydown="handleTagInput(event)">
                </div>
                <div class="common-tags" id="common-tags">
                  <button class="common-tag" onclick="addCommonTag(this)">時間循環</button>
                  <button class="common-tag" onclick="addCommonTag(this)">平行宇宙</button>
                  <button class="common-tag" onclick="addCommonTag(this)">記憶操控</button>
                  <button class="common-tag" onclick="addCommonTag(this)">身分認同</button>
                  <button class="common-tag" onclick="addCommonTag(this)">道德兩難</button>
                  <button class="common-tag" onclick="addCommonTag(this)">末日後</button>
                  <button class="common-tag" onclick="addCommonTag(this)">禁忌之戀</button>
                  <button class="common-tag" onclick="addCommonTag(this)">復仇</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Section 3: 風格與結構 -->
          <div class="sidebar-section" id="section-style">
            <div class="sidebar-section-header" onclick="toggleSection('section-style')">
              <span class="section-icon">🎭</span>
              <span>風格與結構</span>
              <span class="chevron">›</span>
            </div>
            <div class="sidebar-section-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">敘事視角</label>
                  <select class="form-select" id="w-pov">
                    <option value="third-limited">第三人稱有限</option><option value="third-omniscient">第三人稱全知</option>
                    <option value="first">第一人稱</option><option value="second">第二人稱</option><option value="multi">多視角交替</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">語調</label>
                  <select class="form-select" id="w-tone">
                    <option value="literary">文學性</option><option value="suspense">緊張懸疑</option>
                    <option value="poetic">詩意抒情</option><option value="dark">黑暗沉重</option>
                    <option value="humorous">幽默風趣</option><option value="epic">史詩磅礴</option>
                    <option value="intimate">私密細膩</option><option value="surreal">超現實</option>
                  </select>
                </div>
              </div>
              <div class="form-row-3">
                <div class="form-group">
                  <label class="form-label">篇幅</label>
                  <select class="form-select" id="w-length">
                    <option value="flash">極短篇</option><option value="short">短篇</option>
                    <option value="medium" selected>中篇</option><option value="long">長篇</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">結構</label>
                  <select class="form-select" id="w-structure">
                    <option value="three-act">三幕式</option><option value="heros-journey">英雄旅程</option>
                    <option value="kishotenketsu">起承轉結</option><option value="nonlinear">非線性</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">時代</label>
                  <select class="form-select" id="w-era">
                    <option value="modern">現代</option><option value="near-future">近未來</option>
                    <option value="far-future">遠未來</option><option value="past">過去</option>
                    <option value="timeless">超越時間</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <hr class="divider">
          <div class="btn-group">
            <button class="btn btn-primary btn-block" id="btn-generate" onclick="generateStory()">✦ AI 生成故事</button>
          </div>
          <div class="loading-bar" id="gen-loading"><div class="fill"></div></div>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="saveStory()" style="flex:1">保存</button>
            <button class="btn btn-ghost" onclick="exportStory()" style="flex:1">匯出</button>
          </div>
        </div>

        <div class="workshop-main">
          <div class="workshop-tabs">
            <button class="workshop-tab active" data-wtab="preview">故事預覽</button>
            <button class="workshop-tab" data-wtab="outline">故事大綱</button>
            <button class="workshop-tab" data-wtab="characters">角色卡</button>
            <button class="workshop-tab" data-wtab="scenes">場景分鏡</button>
          </div>
          <div class="workshop-tab-content active" id="wtab-preview">
            <div class="story-toolbar">
              <div class="title" id="story-toolbar-title">故事預覽</div>
              <div class="preview-controls">
                <button class="btn btn-ghost btn-sm" onclick="toggleReadingMode()" data-tooltip="閱讀模式 (Ctrl+Shift+R)">📖 閱讀</button>
                <button class="btn btn-ghost btn-sm" onclick="toggleFullscreenPreview()" data-tooltip="全屏預覽 (Ctrl+Shift+F)">⛶ 全屏</button>
                <button class="btn btn-ghost btn-sm" onclick="toggleEdit()">✎ 編輯</button>
                <button class="btn btn-ghost btn-sm" onclick="sendToPrompts()">▶ 生成提示詞</button>
              </div>
            </div>
            <div style="padding:1.8rem 2rem;flex:1;overflow-y:auto" id="story-display-wrap">
              <div class="story-output" id="story-output">
                <div class="placeholder">
                  <p>✦</p>
                  <p>填寫左側故事設定，點擊「AI 生成故事」</p>
                  <p style="margin-top:.5rem;font-size:.8rem">或在此處直接書寫</p>
                </div>
              </div>
              <textarea id="story-edit-area" class="form-textarea" style="display:none;min-height:400px;font-size:1rem;line-height:2.1;background:transparent;border:none;color:var(--text);width:100%;font-weight:300" oninput="currentStoryContent=this.value"></textarea>
            </div>
          </div>
          <div class="workshop-tab-content" id="wtab-outline">
            <div style="padding:1rem 0" id="outline-content">
              <div class="empty-state"><div class="icon">📋</div><p>生成故事後，大綱將自動產生</p></div>
            </div>
          </div>
          <div class="workshop-tab-content" id="wtab-characters">
            <div style="padding:1rem 0" id="characters-content">
              <div class="empty-state"><div class="icon">👤</div><p>生成故事後，角色卡將自動產生</p></div>
            </div>
          </div>
          <div class="workshop-tab-content" id="wtab-scenes">
            <div style="padding:1rem 0" id="scenes-content">
              <div class="empty-state"><div class="icon">🎬</div><p>生成故事後，場景分鏡將自動產生</p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LIBRARY -->
