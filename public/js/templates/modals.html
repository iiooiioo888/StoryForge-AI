<!-- Recharge Modal -->
<div class="modal-overlay" id="recharge-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3>💳 充值積分</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">充值金額</label>
        <div class="recharge-options" id="recharge-options">
          <button class="recharge-option" data-amount="50"><span class="amount">50</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="100"><span class="amount">100</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="500"><span class="amount">500</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="1000"><span class="amount">1000</span><span class="price">免費</span></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">自訂金額</label>
        <input class="form-input" id="recharge-amount" type="number" min="1" max="100000" placeholder="輸入積分數量">
      </div>
      <button class="btn btn-primary btn-block" data-action="doRecharge">確認充值</button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="auth-modal-title">登入</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body">
      <div id="login-form">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="auth-username" placeholder="用戶名" autocomplete="username"></div>
        <div class="form-group">
          <label class="form-label">密碼</label>
          <div class="password-wrapper">
            <input class="form-input" id="auth-password" type="password" placeholder="密碼" autocomplete="current-password">
            <button class="password-toggle" type="button" data-target="auth-password" title="顯示密碼">👁</button>
          </div>
        </div>
        <div id="auth-error" class="auth-error"></div>
        <button class="btn btn-primary btn-block" data-action="doLogin">登入</button>
        <p class="auth-switch">沒有帳號？<a href="#" data-action="showRegisterForm">註冊</a></p>
        <div class="auth-demo-section">
          <p class="auth-demo-hint">快速體驗</p>
          <div class="auth-demo-btns">
            <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="demo" data-password="demo123">👤 Demo</button>
            <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="admin" data-password="admin123">👑 Admin</button>
          </div>
        </div>
      </div>
      <div id="register-form" style="display:none">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="reg-username" autocomplete="username"></div>
        <div class="form-group"><label class="form-label">郵件</label><input class="form-input" id="reg-email" type="email" autocomplete="email"></div>
        <div class="form-group">
          <label class="form-label">密碼</label>
          <div class="password-wrapper">
            <input class="form-input" id="reg-password" type="password" autocomplete="new-password">
            <button class="password-toggle" type="button" data-target="reg-password" title="顯示密碼">👁</button>
          </div>
        </div>
        <div id="reg-error" class="auth-error"></div>
        <button class="btn btn-primary btn-block" data-action="doRegister">註冊</button>
        <p class="auth-switch">已有帳號？<a href="#" data-action="showLoginForm">登入</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Story Detail Modal -->
<div class="modal-overlay" id="story-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3 id="modal-title">故事詳情</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header"><h3 id="confirm-title">確認操作</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body" style="text-align:center">
      <div id="confirm-icon" style="font-size:2.5rem;margin-bottom:1rem">⚠️</div>
      <p id="confirm-message" style="margin-bottom:1.5rem;color:var(--text-muted)">確定要執行此操作嗎？</p>
      <div style="display:flex;gap:.5rem;justify-content:center">
        <button class="btn btn-ghost" data-action="closeModal">取消</button>
        <button class="btn btn-danger" id="confirm-ok">確認</button>
      </div>
    </div>
  </div>
</div>
