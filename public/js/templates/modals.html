<!-- Recharge Modal -->
<div class="modal-overlay" id="recharge-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3>💳 充值積分</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">充值金額</label>
        <div class="recharge-options" id="recharge-options">
          <button class="recharge-option" data-amount="50"><span class="amount">50</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="100"><span class="amount">100</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="500"><span class="amount">500</span><span class="price">免費</span></button>
          <button class="recharge-option" data-amount="1000"><span class="amount">1000</span><span class="price">免費</span></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">自訂金額</label>
        <input class="form-input" id="recharge-amount" type="number" min="1" max="100000" placeholder="輸入積分數量">
      </div>
      <button class="btn btn-primary btn-block" data-action="doRecharge">確認充值</button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="auth-modal-title">登入</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body">
      <div id="login-form">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="auth-username" placeholder="用戶名"></div>
        <div class="form-group"><label class="form-label">密碼</label><input class="form-input" id="auth-password" type="password" placeholder="密碼"></div>
        <div id="auth-error" style="color:var(--danger);font-size:.8rem;margin-bottom:.8rem;display:none"></div>
        <button class="btn btn-primary btn-block" data-action="doLogin">登入</button>
        <p style="text-align:center;margin-top:.8rem;font-size:.8rem;color:var(--text-dim)">沒有帳號？<a href="#" data-action="showRegisterForm" style="color:var(--accent)">註冊</a></p>
        <div style="margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border);text-align:center">
          <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="demo" data-password="demo123">Demo</button>
          <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="admin" data-password="admin123">Admin</button>
        </div>
      </div>
      <div id="register-form" style="display:none">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="reg-username"></div>
        <div class="form-group"><label class="form-label">郵件</label><input class="form-input" id="reg-email" type="email"></div>
        <div class="form-group"><label class="form-label">密碼</label><input class="form-input" id="reg-password" type="password"></div>
        <div id="reg-error" style="color:var(--danger);font-size:.8rem;margin-bottom:.8rem;display:none"></div>
        <button class="btn btn-primary btn-block" data-action="doRegister">註冊</button>
        <p style="text-align:center;margin-top:.8rem;font-size:.8rem;color:var(--text-dim)">已有帳號？<a href="#" data-action="showLoginForm" style="color:var(--accent)">登入</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Story Detail Modal -->
<div class="modal-overlay" id="story-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3 id="modal-title">故事詳情</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
