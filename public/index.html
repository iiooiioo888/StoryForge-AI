<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge AI — AI 故事創作與影片提示詞平台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<!-- SEO 基礎 Meta 標籤 -->
<meta name="description" content="StoryForge AI 是結合 AI 創意寫作與影片提示詞生成的全端平台。從故事構思到鏡頭語言，一站式完成從文字到影像的轉化。">
<meta name="keywords" content="AI 寫作, 故事創作, 影片提示詞, Sora, Runway, Kling, 鏡頭語言, 劇本生成, AI 小說">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://storyforge.ai/app">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://storyforge.ai/app">
<meta property="og:title" content="StoryForge AI — AI 故事創作與影片提示詞平台">
<meta property="og:description" content="結合 AI 創意寫作與影片提示詞生成，將故事轉化為可拍攝的視覺場景">
<meta property="og:image" content="https://storyforge.ai/og-image.png">
<meta property="og:site_name" content="StoryForge AI">
<meta property="og:locale" content="zh_TW">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="StoryForge AI — AI 故事創作與影片提示詞平台">
<meta name="twitter:description" content="結合 AI 創意寫作與影片提示詞生成，一站式從文字到影像">
<meta name="twitter:image" content="https://storyforge.ai/og-image.png">

<!-- JSON-LD 結構化資料 -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "StoryForge AI",
  "url": "https://storyforge.ai/app",
  "applicationCategory": "DesignApplication",
  "operatingSystem": "Web",
  "description": "AI 故事創作與影片提示詞生成平台，結合創意寫作與鏡頭語言工具",
  "offers": {
    "@type": "AggregateOffer",
    "lowPrice": "0",
    "highPrice": "49.99",
    "priceCurrency": "USD"
  },
  "featureList": [
    "AI 故事生成",
    "影片提示詞生成",
    "鏡頭語言百科",
    "燈光與視覺風格",
    "角色與場景管理",
    "工作流編排"
  ]
}
</script>
</head>
<body>
<!-- ═══ NAV ═══ -->
<nav class="nav" id="main-nav">
  <div class="nav-brand" data-action="switchTab" data-tab="home">🎬 StoryForge <span>AI</span></div>
  <div class="nav-links" id="nav-links">
    <button class="nav-link active" data-action="switchTab" data-tab="home">首頁</button>
    <button class="nav-link" data-action="switchTab" data-tab="workshop">工作坊</button>
    <button class="nav-link" data-action="switchTab" data-tab="library">資料庫</button>
    <button class="nav-link" data-action="switchTab" data-tab="prompts">提示詞</button>
    <button class="nav-link" data-action="switchTab" data-tab="camera">鏡頭</button>
    <button class="nav-link" data-action="switchTab" data-tab="video-story">🎬 影片腳本</button>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="選單">☰</button>
  <div class="nav-right">
    <div class="nav-credits" id="nav-credits" style="display:none" data-action="switchTab" data-tab="credits" title="積分餘額">
      <span class="credits-icon">💎</span>
      <span class="credits-amount" id="credits-amount">0</span>
    </div>
    <button class="btn btn-ghost btn-sm" data-action="toggleTheme" title="切換主題">◐</button>
    <button class="btn btn-secondary btn-sm" data-action="showAuthModal" id="auth-btn">登入</button>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <!-- Panel containers (content loaded dynamically from templates) -->
  <div id="panel-home" class="panel active"></div>
  <div id="panel-workshop" class="panel"></div>
  <div id="panel-library" class="panel"></div>
  <div id="panel-prompts" class="panel"></div>
  <div id="panel-camera" class="panel"></div>
  <div id="panel-credits" class="panel"></div>
  <div id="panel-video-story" class="panel"></div>
</main>

<!-- ═══ FOOTER ═══ -->
<footer class="site-footer">
  <div class="footer-brand">◆ StoryForge AI</div>
  <div class="footer-links">
    <button class="btn btn-ghost btn-sm" data-action="switchTab" data-tab="home">首頁</button>
    <button class="btn btn-ghost btn-sm" data-action="switchTab" data-tab="workshop">工作坊</button>
    <button class="btn btn-ghost btn-sm" data-action="switchTab" data-tab="library">資料庫</button>
  </div>
  <div class="footer-copy">© 2026 StoryForge AI — 以創意驅動敘事 · 以想像塑造畫面</div>
</footer>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- ═══ SCRIPTS ═══ -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
