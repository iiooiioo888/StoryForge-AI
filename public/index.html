<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge AI — AI 故事創作與影片提示詞平台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<meta name="description" content="StoryForge AI — 結合 AI 創意寫作與影片提示詞生成">
<meta property="og:title" content="StoryForge AI">
<meta property="og:description" content="AI 故事創作與影片提示詞平台">
</head>
<body>
<!-- ═══ NAV ═══ -->
<nav class="nav">
  <div class="nav-brand" data-action="switchTab" data-tab="home">🎬 StoryForge <span>AI</span></div>
  <div class="nav-links" id="nav-links">
    <button class="nav-link active" data-action="switchTab" data-tab="home">首頁</button>
    <button class="nav-link" data-action="switchTab" data-tab="workshop">工作坊</button>
    <button class="nav-link" data-action="switchTab" data-tab="library">資料庫</button>
    <button class="nav-link" data-action="switchTab" data-tab="prompts">提示詞</button>
    <button class="nav-link" data-action="switchTab" data-tab="camera">鏡頭</button>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost btn-sm" data-action="toggleTheme" title="切換主題">◐</button>
    <button class="btn btn-secondary btn-sm" data-action="showAuthModal" id="auth-btn">登入</button>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="main">
<!-- HOME -->
<div id="panel-home" class="panel active">
  <div class="hero">
    <h1>🎬 Craft Stories.<br><em>Generate Visions</em>.</h1>
    <p>結合 AI 創意寫作與影片提示詞生成，將故事轉化為可拍攝的視覺場景</p>
    <div class="hero-cta">
      <button class="btn btn-primary" data-action="switchTab" data-tab="workshop">✦ 開始創作</button>
      <button class="btn btn-secondary" data-action="switchTab" data-tab="library">瀏覽故事庫</button>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="stat-stories">0</div><div class="stat-label">故事</div></div>
      <div class="stat"><div class="stat-num" id="stat-scenes">0</div><div class="stat-label">場景</div></div>
      <div class="stat"><div class="stat-num" id="stat-prompts">0</div><div class="stat-label">提示詞</div></div>
    </div>
  </div>
  <div class="container">
    <div class="section-title">近期創作</div>
    <div class="grid" id="recent-stories"></div>
  </div>
</div>

<!-- WORKSHOP -->
<div id="panel-workshop" class="panel">
  <div class="container">
    <div class="workshop">
      <div class="workshop-sidebar">
        <div class="section-title">故事設定</div>
        <button class="btn btn-primary btn-block" data-action="aiAutoFill" id="btn-ai-autofill">✦ AI 全權生成</button>
        <div style="height:1rem"></div>
        <div class="form-group"><label class="form-label">標題</label><input class="form-input" id="w-title" placeholder="故事標題..."></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">類型</label>
            <select class="form-select" id="w-genre"><option value="">選擇...</option>
              <option value="scifi">科幻</option><option value="fantasy">奇幻</option>
              <option value="romance">愛情</option><option value="mystery">懸疑</option>
              <option value="horror">恐怖</option><option value="wuxia">武俠</option>
            </select></div>
          <div class="form-group"><label class="form-label">子類型</label><select class="form-select" id="w-subgenre"><option value="">選擇...</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">核心主題</label><input class="form-input" id="w-theme" placeholder="例如：時間旅行的代價"></div>
        <div class="form-group"><label class="form-label">世界觀</label><textarea class="form-textarea" id="w-setting" rows="2" placeholder="描述環境..."></textarea></div>
        <div class="form-group"><label class="form-label">角色（每行一個）</label><textarea class="form-textarea" id="w-characters" rows="3" placeholder="名字 - 身份 - 特徵"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">視角</label>
            <select class="form-select" id="w-pov"><option value="third-limited">第三人稱</option><option value="first">第一人稱</option></select></div>
          <div class="form-group"><label class="form-label">語調</label>
            <select class="form-select" id="w-tone"><option value="literary">文學性</option><option value="suspense">懸疑</option><option value="epic">史詩</option></select></div>
        </div>
        <div style="height:1rem"></div>
        <button class="btn btn-primary btn-block" data-action="generateStory" id="btn-generate">✦ AI 生成故事</button>
        <div style="height:.5rem"></div>
        <div class="form-row">
          <button class="btn btn-secondary" data-action="saveStory" style="flex:1">💾 保存</button>
          <button class="btn btn-ghost" data-action="exportStory" style="flex:1">📤 匯出</button>
        </div>
      </div>
      <div class="workshop-main">
        <div class="workshop-tabs">
          <button class="workshop-tab active" data-wtab="preview">預覽</button>
          <button class="workshop-tab" data-wtab="outline">大綱</button>
          <button class="workshop-tab" data-wtab="characters">角色</button>
        </div>
        <div class="workshop-content">
          <div class="workshop-tab-content active" id="wtab-preview">
            <div id="story-output"><div class="empty"><div class="icon">✦</div><p>填寫左側設定，點擊「AI 生成故事」</p></div></div>
          </div>
          <div class="workshop-tab-content" id="wtab-outline"><div id="outline-content"><div class="empty"><div class="icon">📋</div><p>生成故事後自動產生</p></div></div></div>
          <div class="workshop-tab-content" id="wtab-characters"><div id="characters-content"><div class="empty"><div class="icon">👤</div><p>生成故事後自動產生</p></div></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIBRARY -->
<div id="panel-library" class="panel">
  <div class="container">
    <div class="section-title">故事資料庫 <span id="lib-count" style="margin-left:auto;font-weight:400;color:var(--text-dim)"></span></div>
    <input class="form-input" id="search-input" placeholder="搜尋故事..." style="margin-bottom:1rem">
    <div class="grid" id="library-grid"></div>
    <div class="empty" id="library-empty" style="display:none"><div class="icon">📖</div><p>還沒有故事</p><button class="btn btn-primary" data-action="switchTab" data-tab="workshop">開始創作</button></div>
  </div>
</div>

<!-- PROMPTS -->
<div id="panel-prompts" class="panel">
  <div class="container">
    <div class="section-title">影片提示詞生成</div>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem">
      <select class="form-select" id="prompt-story-select" style="flex:1;min-width:200px"><option value="">選擇故事...</option></select>
      <select class="form-select" id="prompt-platform" style="width:120px"><option value="sora">Sora</option><option value="runway">Runway</option><option value="kling">Kling</option><option value="general">通用</option></select>
      <button class="btn btn-primary" data-action="generatePrompts">✦ 生成</button>
    </div>
    <div id="prompts-result"></div>
    <div class="empty" id="prompts-empty"><div class="icon">🎬</div><p>選擇故事並生成影片提示詞</p></div>
  </div>
</div>

<!-- CAMERA -->
<div id="panel-camera" class="panel">
  <div class="container">
    <div class="section-title">鏡頭語言百科</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
      <button class="btn btn-primary btn-sm" data-action="loadCameraTab" data-cam-tab="movements">🎥 運鏡</button>
      <button class="btn btn-ghost btn-sm" data-action="loadCameraTab" data-cam-tab="lighting">💡 燈光</button>
      <button class="btn btn-ghost btn-sm" data-action="loadCameraTab" data-cam-tab="visual-styles">🎨 風格</button>
      <button class="btn btn-ghost btn-sm" data-action="loadCameraTab" data-cam-tab="color-palettes">🎨 調色</button>
    </div>
    <div class="grid" id="cam-grid"></div>
  </div>
</div>
</main>

<!-- ═══ MODALS ═══ -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="auth-modal-title">登入</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body">
      <div id="login-form">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="auth-username" placeholder="用戶名"></div>
        <div class="form-group"><label class="form-label">密碼</label><input class="form-input" id="auth-password" type="password" placeholder="密碼"></div>
        <div id="auth-error" style="color:var(--danger);font-size:.8rem;margin-bottom:.8rem;display:none"></div>
        <button class="btn btn-primary btn-block" data-action="doLogin">登入</button>
        <p style="text-align:center;margin-top:.8rem;font-size:.8rem;color:var(--text-dim)">沒有帳號？<a href="#" data-action="showRegisterForm" style="color:var(--accent)">註冊</a></p>
        <div style="margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border);text-align:center">
          <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="demo" data-password="demo123">Demo</button>
          <button class="btn btn-ghost btn-sm" data-action="fillDemo" data-username="admin" data-password="admin123">Admin</button>
        </div>
      </div>
      <div id="register-form" style="display:none">
        <div class="form-group"><label class="form-label">用戶名</label><input class="form-input" id="reg-username"></div>
        <div class="form-group"><label class="form-label">郵件</label><input class="form-input" id="reg-email" type="email"></div>
        <div class="form-group"><label class="form-label">密碼</label><input class="form-input" id="reg-password" type="password"></div>
        <div id="reg-error" style="color:var(--danger);font-size:.8rem;margin-bottom:.8rem;display:none"></div>
        <button class="btn btn-primary btn-block" data-action="doRegister">註冊</button>
        <p style="text-align:center;margin-top:.8rem;font-size:.8rem;color:var(--text-dim)">已有帳號？<a href="#" data-action="showLoginForm" style="color:var(--accent)">登入</a></p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="story-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3 id="modal-title">故事詳情</h3><button class="modal-close" data-action="closeModal">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- ═══ SCRIPTS ═══ -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
