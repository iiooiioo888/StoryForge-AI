version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: storyforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: storyforge-app
    ports:
      - "8888:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/storyforge
      - JWT_SECRET=${JWT_SECRET:-storyforge2024}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL:-}
      - CUSTOM_LLM_KEY=${CUSTOM_LLM_KEY:-}
      - CUSTOM_LLM_MODEL=${CUSTOM_LLM_MODEL:-}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
